# --- MineGit Architectury mod toolchain pins (Spec D batch 1, issue #57) ---
# The engine tree (core/protocol/minegit-cli/plugin) is Java 8 and ignores these; only the
# mod subprojects (mod:common / mod:fabric / mod:neoforge) read them.

org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# Minecraft / loaders — one released toolchain line for MC 1.21.11, Java 21, Mojang mappings.
minecraft_version=1.21.11
java_version=21
enabled_platforms=fabric,neoforge

# Architectury build plugins (also mirrored as literals in the root plugins{} block).
loom_version=1.14.475
architectury_plugin_version=3.5.166

# Architectury API + loader libraries (all aligned to MC 1.21.11).
architectury_version=19.0.1
fabric_loader_version=0.19.3
fabric_api_version=0.141.4+1.21.11
neoforge_version=21.11.42

# Mod identity.
mod_id=minegit
mod_name=MineGit
mod_group=com.minegit.mod
mod_version=0.1.0
