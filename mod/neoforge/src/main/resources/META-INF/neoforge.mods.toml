modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"
issueTrackerURL = "https://github.com/VocanicZ/MineGit/issues"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "MineGit"
description = '''
Git-backed version control for Minecraft worlds — single-player capable (integrated server).
'''
authors = "RainBowCreation, VocanicZ, NathanielSong"

[[mixins]]
config = "minegit.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "[21.11,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.11,1.22)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "architectury"
type = "required"
versionRange = "[19,)"
ordering = "AFTER"
side = "BOTH"
